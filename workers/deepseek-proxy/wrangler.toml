# DeepSeek API Proxy — Cloudflare Worker
#
# This worker sits between your static Next.js blog and the DeepSeek API,
# keeping your API key secure on the server side.
#
# Deploy with:  npx wrangler deploy
# Secrets:      npx wrangler secret put DEEPSEEK_API_KEY

name = "deepseek-proxy"
main = "src/index.ts"
compatibility_date = "2025-05-04"

# Workers free tier is generous — 100k requests/day
# If your blog gets more traffic, consider adding rate limiting

[observability]
enabled = true
